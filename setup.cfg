[flake8]
exclude =
    sam2/,
    __pycache__,
    .git,
    .venv,
    venv,
    help/,
    test/,
    tools/,
    plugin_upload.py,
    resources.py,
    resources_rc.py

ignore = E402, E501, E226, E231, E221, E225, E129, E128, E203, E701, W503, W504

per-file-ignores =
    geo_osam.py: F401, F403
